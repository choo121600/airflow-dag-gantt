<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dag Gantt Chart</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --accent: #4fc3f7;
    --grid: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    padding: 20px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 13px;
    color: var(--text-dim);
    margin-right: 2px;
  }
  .controls select, .controls button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .controls select:hover, .controls button:hover {
    border-color: var(--accent);
  }
  .controls button.active {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
  }
  .chart-container {
    padding: 0 24px 24px;
    overflow-x: auto;
  }
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-dim);
    font-size: 15px;
  }
  .error {
    text-align: center;
    padding: 40px 0;
    color: #ef5350;
    font-size: 14px;
  }
  .stats-bar {
    padding: 4px 24px 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: #222244;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 300px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .tooltip .dag-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .tooltip .row { display: flex; justify-content: space-between; gap: 16px; }
  .tooltip .label { color: var(--text-dim); }

  /* Tag colors */
  .tag-colors {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    padding: 0 24px 8px;
  }
  .tag-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .tag-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Dag Gantt Chart</h1>
  <div class="controls">
    <label>Metric</label>
    <button id="btn-mean" class="active" onclick="setMetric('mean')">Mean</button>
    <button id="btn-median" onclick="setMetric('median')">Median</button>

    <label style="margin-left:8px">Runs</label>
    <select id="sel-limit" onchange="fetchData()">
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="0">All</option>
    </select>
  </div>
</div>

<div class="tag-colors" id="legend"></div>
<div class="stats-bar" id="stats-bar"></div>
<div class="chart-container" id="chart-container">
  <div class="loading" id="loading">Loading Dag run data...</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const PALETTE = [
  '#4fc3f7','#81c784','#ffb74d','#e57373','#ba68c8',
  '#4dd0e1','#aed581','#ff8a65','#f06292','#7986cb',
  '#26c6da','#dce775','#ffab91','#ce93d8','#90a4ae',
];

let currentMetric = 'mean';
let currentData = [];
let tagColorMap = {};

function setMetric(m) {
  currentMetric = m;
  document.getElementById('btn-mean').classList.toggle('active', m === 'mean');
  document.getElementById('btn-median').classList.toggle('active', m === 'median');
  if (currentData.length) render(currentData);
  else fetchData();
}

async function fetchData() {
  const limit = document.getElementById('sel-limit').value;
  const container = document.getElementById('chart-container');
  container.innerHTML = '<div class="loading">Loading Dag run data...</div>';

  try {
    const resp = await fetch(`./api/stats?limit=${limit}&metric=${currentMetric}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    currentData = await resp.json();
    render(currentData);
  } catch (e) {
    container.innerHTML = `<div class="error">Failed to load data: ${e.message}</div>`;
  }
}

function buildTagColors(data) {
  const allTags = new Set();
  data.forEach(d => (d.tags || []).forEach(t => allTags.add(t)));
  const sorted = [...allTags].sort();
  tagColorMap = {};
  sorted.forEach((t, i) => { tagColorMap[t] = PALETTE[i % PALETTE.length]; });

  const legend = document.getElementById('legend');
  if (sorted.length === 0) {
    legend.innerHTML = '';
    return;
  }
  legend.innerHTML = sorted.map(t =>
    `<span class="tag-legend"><span class="tag-swatch" style="background:${tagColorMap[t]}"></span>${t}</span>`
  ).join('');
}

function dagColor(dag) {
  const tags = dag.tags || [];
  if (tags.length && tagColorMap[tags[0]]) return tagColorMap[tags[0]];
  // Hash-based fallback
  let hash = 0;
  for (let i = 0; i < dag.dag_id.length; i++) hash = dag.dag_id.charCodeAt(i) + ((hash << 5) - hash);
  return PALETTE[Math.abs(hash) % PALETTE.length];
}

function render(data) {
  if (!data.length) {
    document.getElementById('chart-container').innerHTML =
      '<div class="loading">No successful Dag runs found.</div>';
    document.getElementById('stats-bar').textContent = '';
    return;
  }

  buildTagColors(data);

  const totalRuns = data.reduce((s, d) => s + d.run_count, 0);
  document.getElementById('stats-bar').textContent =
    `${data.length} Dags / ${totalRuns} runs total`;

  const ROW_H = 28;
  const GAP = 4;
  const LABEL_W = 220;
  const CHART_W = 960;
  const PAD_TOP = 32;
  const PAD_BOTTOM = 24;
  const TOTAL_W = LABEL_W + CHART_W + 20;
  const TOTAL_H = PAD_TOP + data.length * (ROW_H + GAP) + PAD_BOTTOM;

  // Use display_start/display_end based on metric
  const startKey = 'display_start';
  const endKey = 'display_end';

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${TOTAL_W}" height="${TOTAL_H}" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">`;

  // Background
  svg += `<rect width="${TOTAL_W}" height="${TOTAL_H}" fill="#1a1a2e"/>`;

  // Time axis (24h)
  for (let h = 0; h <= 24; h++) {
    const x = LABEL_W + (h / 24) * CHART_W;
    const major = h % 3 === 0;
    svg += `<line x1="${x}" y1="${PAD_TOP - 4}" x2="${x}" y2="${TOTAL_H - PAD_BOTTOM}" stroke="${major ? '#3a3a5a' : '#2a2a4a'}" stroke-width="${major ? 1 : 0.5}"/>`;
    if (major) {
      svg += `<text x="${x}" y="${PAD_TOP - 10}" text-anchor="middle" fill="#8888aa" font-size="11">${String(h % 24).padStart(2,'0')}:00</text>`;
    }
  }

  // Bars
  data.forEach((dag, i) => {
    const y = PAD_TOP + i * (ROW_H + GAP);
    const startMin = dag[startKey];
    const endMin = dag[endKey];
    const barX = LABEL_W + (startMin / 1440) * CHART_W;
    let barW = ((endMin - startMin) / 1440) * CHART_W;
    if (barW < 3) barW = 3; // minimum visible width

    const color = dagColor(dag);

    // Row background on hover
    svg += `<rect class="row-bg" data-idx="${i}" x="0" y="${y}" width="${TOTAL_W}" height="${ROW_H}" fill="transparent" rx="4"/>`;

    // Dag label
    const displayName = dag.dag_id.length > 28 ? dag.dag_id.slice(0, 26) + '..' : dag.dag_id;
    svg += `<text x="${LABEL_W - 8}" y="${y + ROW_H / 2 + 4}" text-anchor="end" fill="#ccccdd" font-size="12">${displayName}</text>`;

    // Bar
    svg += `<rect class="bar" data-idx="${i}" x="${barX}" y="${y + 4}" width="${barW}" height="${ROW_H - 8}" rx="4" fill="${color}" opacity="0.85"/>`;

    // Duration label on bar (if wide enough)
    const durKey = currentMetric === 'mean' ? 'avg_duration_min' : 'median_duration_min';
    const durStr = dag[durKey] < 60
      ? `${dag[durKey].toFixed(0)}m`
      : `${(dag[durKey] / 60).toFixed(1)}h`;
    if (barW > 36) {
      svg += `<text x="${barX + barW / 2}" y="${y + ROW_H / 2 + 4}" text-anchor="middle" fill="#111" font-size="10" font-weight="600">${durStr}</text>`;
    }
  });

  svg += '</svg>';

  document.getElementById('chart-container').innerHTML = svg;

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  const svgEl = document.querySelector('#chart-container svg');

  svgEl.addEventListener('mousemove', (e) => {
    const target = e.target.closest('.bar, .row-bg');
    if (!target) { tooltip.style.display = 'none'; return; }
    const idx = parseInt(target.dataset.idx);
    const dag = data[idx];
    if (!dag) { tooltip.style.display = 'none'; return; }

    const durKey = currentMetric === 'mean' ? 'avg_duration_min' : 'median_duration_min';
    tooltip.innerHTML = `
      <div class="dag-name">${dag.dag_id}</div>
      <div class="row"><span class="label">Mean</span> ${dag.avg_start} ~ ${dag.avg_end}</div>
      <div class="row"><span class="label">Median</span> ${dag.median_start} ~ ${dag.median_end}</div>
      <div class="row"><span class="label">Duration (${currentMetric})</span> ${dag[durKey].toFixed(1)} min</div>
      <div class="row"><span class="label">Runs</span> ${dag.run_count}</div>
      ${dag.tags.length ? `<div class="row"><span class="label">Tags</span> ${dag.tags.join(', ')}</div>` : ''}
    `;
    tooltip.style.display = 'block';

    let tx = e.clientX + 12;
    let ty = e.clientY + 12;
    const rect = tooltip.getBoundingClientRect();
    if (tx + 300 > window.innerWidth) tx = e.clientX - 300;
    if (ty + 200 > window.innerHeight) ty = e.clientY - 200;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  });

  svgEl.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
}

// Initial load
fetchData();
</script>
</body>
</html>
